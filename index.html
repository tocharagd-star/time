<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown & Cube</title>
<!-- Пиксельный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

body {
  color: #fff;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  perspective: 600px;
}

/* --- ТАЙМЕР (Стиль из оригинала) --- */
h1 {
  font-size: 2.5rem;
  margin-bottom: 50px;
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;
  transform: perspective(400px) rotateX(25deg);
  z-index: 10;
}

.countdown {
  display: flex;
  gap: 50px;
  transform: perspective(800px) rotateX(-15deg);
  z-index: 10;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.number {
  font-size: 5.5rem;
  font-weight: 900;
  min-width: 140px;
  text-align: center;
}

.pulse-tick {
  animation: pulse-tick 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
}

@keyframes pulse-tick {
  0%   { transform: scale(1.45); color: #ff3030; }
  100% { transform: scale(1);    color: #ffffff; }
}

.label {
  font-size: 0.85rem;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 14px;
  opacity: 0.6;
}

/* --- КУБИК --- */
#cube-container {
  position: fixed;
  bottom: 20px;
  left: 0;
  width: 64px; /* 16x16 увеличенный */
  height: 64px;
  z-index: 100;
  cursor: pointer;
  animation: walk 8s linear infinite alternate;
}

#cube-sprite {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

@keyframes walk {
  0% { left: 5%; transform: scaleX(1); }
  100% { left: 85%; transform: scaleX(-1); }
}

/* --- ДИАЛОГОВОЕ ОКНО --- */
#dialogue-box {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  max-width: 90%;
  height: 150px;
  background: #000;
  border: 4px solid #fff;
  display: none;
  padding: 20px;
  z-index: 200;
  font-family: 'Press Start 2P', cursive;
  flex-direction: row;
  gap: 20px;
}

/* 2-кадровая анимация появления */
#dialogue-box.opening-1 { display: flex; height: 20px; overflow: hidden; }
#dialogue-box.opening-2 { display: flex; height: 150px; }

.diag-cube-wrap {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
}

#diag-cube-img {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

#diag-text {
  font-size: 14px;
  line-height: 1.6;
  color: #fff;
  word-wrap: break-word;
}

.choices {
  margin-top: 15px;
  display: none;
  gap: 20px;
}

.choice-btn {
  background: none;
  border: none;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  cursor: pointer;
  padding: 5px;
}

.choice-btn:hover {
  color: #ffff00;
}

.choice-btn::before {
  content: '❤ ';
  opacity: 0;
}

.choice-btn:hover::before {
  opacity: 1;
}

/* Финальные эффекты */
.final-mode .unit:not(#sec-unit) { opacity: 0; position: absolute; }
.final-mode #seconds { font-size: 15rem; }

@media (max-width: 600px) {
  .countdown { gap: 10px; }
  .number { font-size: 2.5rem; min-width: 60px; }
  #dialogue-box { width: 95%; height: 180px; font-size: 10px; }
  #diag-text { font-size: 10px; }
}
</style>
</head>
<body>

<h1 id="title">days left</h1>

<div class="countdown" id="countdown">
  <div class="unit" id="day-unit">
    <div class="number" id="days"><span class="current">00</span></div>
    <div class="label">days</div>
  </div>
  <div class="unit" id="hr-unit">
    <div class="number" id="hours"><span class="current">00</span></div>
    <div class="label">hours</div>
  </div>
  <div class="unit" id="min-unit">
    <div class="number" id="minutes"><span class="current">00</span></div>
    <div class="label">minutes</div>
  </div>
  <div class="unit" id="sec-unit">
    <div class="number" id="seconds"><span class="current">00</span></div>
    <div class="label" id="sec-label">seconds</div>
  </div>
</div>

<div id="cube-container">
  <img src="idle.png" id="cube-sprite" alt="cube">
</div>

<div id="dialogue-box">
  <div class="diag-cube-wrap">
    <img src="idle.png" id="diag-cube-img" alt="talking-cube">
  </div>
  <div class="diag-content">
    <div id="diag-text"></div>
    <div id="choices" class="choices">
      <button class="choice-btn" onclick="handleChoice('yes')">КОНЕЧНО</button>
      <button class="choice-btn" onclick="handleChoice('no')">НЕТ</button>
    </div>
  </div>
</div>

<script>
// ========== НАСТРОЙКИ ==========
const target = new Date(2026, 6, 7, 0, 0, 0).getTime(); // 7 июля 2026, 00:00

// ========== ЗВУКИ ==========
let audioCtx = null;
let beepBuffer = null;
let tickBuffer = null;

async function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Загрузка звука бипа для диалога
  const resD = await fetch('D.mp3');
  const arrayD = await resD.arrayBuffer();
  beepBuffer = await audioCtx.decodeAudioData(arrayD);

  // Загрузка звука тиканья
  const resT = await fetch('tick.wav');
  const arrayT = await resT.arrayBuffer();
  tickBuffer = await audioCtx.decodeAudioData(arrayT);
}

function playBeep() {
  if (!audioCtx || !beepBuffer) return;
  const source = audioCtx.createBufferSource();
  source.buffer = beepBuffer;
  source.connect(audioCtx.destination);
  source.start();
}

function playTick() {
  if (!audioCtx || !tickBuffer) return;
  const source = audioCtx.createBufferSource();
  source.buffer = tickBuffer;
  source.connect(audioCtx.destination);
  source.start();
}

// ========== ОПРЕДЕЛЕНИЕ СИСТЕМЫ ==========
function getOS() {
  const ua = window.navigator.userAgent;
  if (ua.indexOf("Windows") !== -1) return "Windows";
  if (ua.indexOf("Mac") !== -1) return "macOS";
  if (ua.indexOf("Android") !== -1) return "Android";
  if (ua.indexOf("iPhone") !== -1) return "iOS";
  return "System";
}

// ========== ДИАЛОГОВАЯ СИСТЕМА ==========
const diagBox = document.getElementById('dialogue-box');
const diagText = document.getElementById('diag-text');
const diagImg = document.getElementById('diag-cube-img');
const choicesEl = document.getElementById('choices');
let isTyping = false;

async function typeSentence(text) {
  isTyping = true;
  diagText.textContent = "";
  choicesEl.style.display = 'none';
  
  for (let i = 0; i < text.length; i++) {
    diagText.textContent += text[i];
    
    // Анимация рта
    if (text[i] !== " ") {
      diagImg.src = (i % 2 === 0) ? 'talking0.png' : 'talking1.png';
      playBeep();
    }
    
    await new Promise(r => setTimeout(r, 60));
  }
  
  diagImg.src = 'idle.png';
  isTyping = false;
}

document.getElementById('cube-container').onclick = async () => {
  await initAudio();
  if (diagBox.style.display === 'flex') return;

  // 2-кадровая анимация появления
  diagBox.className = 'opening-1';
  diagBox.style.display = 'flex';
  
  setTimeout(() => {
    diagBox.className = 'opening-2';
    startDialogue();
  }, 100);
};

async function startDialogue() {
  const os = getOS();
  await typeSentence(`Привет, пользователь ${os}...`);
  await new Promise(r => setTimeout(r, 1000));
  await typeSentence("Осталась неделя.");
  await new Promise(r => setTimeout(r, 1000));
  await typeSentence("Надеюсь, ты появишься в последние секунды на сайте, да ведь?");
  choicesEl.style.display = 'flex';
}

function handleChoice(val) {
  if (val === 'yes') {
    typeSentence("Я так и знал. До встречи.");
  } else {
    typeSentence("Жаль... Очень жаль.");
  }
  setTimeout(() => {
    diagBox.style.display = 'none';
  }, 3000);
}

// ========== ТАЙМЕР (Оригинальная логика) ==========
const containers = {
  days: document.getElementById('days'),
  hours: document.getElementById('hours'),
  minutes: document.getElementById('minutes'),
  seconds: document.getElementById('seconds')
};
let prev = {};
let finalMode = false;
let ended = false;

function pad(n) { return String(n).padStart(2, '0'); }

function update() {
  if (ended) return;
  let diff = target - Date.now();
  
  if (diff <= 0) {
    if (!ended) {
        ended = true;
        // Здесь можно вызвать doEnd() из твоего кода
        document.getElementById('seconds').textContent = "0";
    }
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  if (diff <= 10000 && !finalMode) {
    finalMode = true;
    document.getElementById('countdown').classList.add('final-mode');
    document.getElementById('title').style.opacity = '0';
  }

  const now = {
    days: pad(d),
    hours: pad(h),
    minutes: pad(m),
    seconds: finalMode ? String(s) : pad(s)
  };

  for (const key in now) {
    if (now[key] !== prev[key]) {
      const el = containers[key].querySelector('.current');
      el.textContent = now[key];
      el.classList.remove('pulse-tick');
      void el.offsetWidth;
      el.classList.add('pulse-tick');
      if (key === 'seconds') playTick();
      prev[key] = now[key];
    }
  }
}

setInterval(update, 1000);
update();

// Разблокировка аудио при первом клике
document.addEventListener('click', () => { if(audioCtx) audioCtx.resume(); }, {once: true});
</script>

</body>
</html>
