<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  color: #fff;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  background: #000;
  perspective: 600px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 50px;
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;
  transition: opacity 1s ease;
  position: relative;
  z-index: 10;
  /* перспектива — узко сверху, шире снизу */
  transform: perspective(400px) rotateX(25deg);
  transform-style: preserve-3d;
}

.countdown {
  display: flex;
  gap: 50px;
  transition: gap 1s ease;
  position: relative;
  z-index: 10;
  /* основной текст — широко по краям */
  transform: perspective(800px) rotateX(-15deg);
  transform-style: preserve-3d;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: opacity 1s ease, transform 1s ease;
}

.number {
  font-size: 5.5rem;
  font-weight: 900;
  min-width: 140px;
  text-align: center;
  line-height: 1.2;
  position: relative;
  transition: font-size 1s ease;
}

.number .current {
  display: inline-block;
  transform-origin: center center;
}

.pulse-tick {
  animation: pulse-tick 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
}

@keyframes pulse-tick {
  0%   { transform: scale(1.45); color: #ff3030; }
  100% { transform: scale(1);    color: #ffffff; }
}

.label {
  font-size: 0.85rem;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 14px;
  opacity: 0.6;
}

.final-mode .unit:not(#sec-unit) {
  opacity: 0;
  transform: scale(0.5);
  pointer-events: none;
  position: absolute;
}

.final-mode .countdown { gap: 0; transform: perspective(800px) rotateX(-10deg); }
.final-mode #seconds { font-size: 15rem; overflow: visible; }
.final-mode #sec-label { opacity: 0; }

.beat { animation: beat 0.8s cubic-bezier(0.0, 0.0, 0.2, 1) forwards; }

@keyframes beat {
  0%   { transform: scale(1.5); color: #ff0000; }
  100% { transform: scale(1); color: #ffffff; }
}

.glitch-zero {
  position: relative;
  animation: glitch 0.6s steps(4) forwards;
  color: #ff0000 !important;
}

.glitch-zero::before, .glitch-zero::after {
  content: '0';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.glitch-zero::before {
  color: #ff0000;
  animation: glitch-r 0.6s steps(4) forwards;
  clip-path: inset(0 0 50% 0);
}

.glitch-zero::after {
  color: #0000ff;
  animation: glitch-b 0.6s steps(4) forwards;
  clip-path: inset(50% 0 0 0);
}

@keyframes glitch {
  0%   { transform: translate(4px, -3px); }
  25%  { transform: translate(-5px, 2px); }
  50%  { transform: translate(3px, -1px); }
  75%  { transform: translate(-2px, 4px); }
  100% { transform: translate(0, 0); }
}

@keyframes glitch-r { 0% { transform: translate(6px, -4px); } 100% { transform: translate(0, 0); opacity: 0; } }
@keyframes glitch-b { 0% { transform: translate(-5px, 3px); } 100% { transform: translate(0, 0); opacity: 0; } }

.physics-fall { animation: physics-fall 3s forwards; }

@keyframes physics-fall {
  0%    { transform: translateY(0) rotate(0deg); opacity: 1; }
  30%   { transform: translateY(140px) rotate(-2deg); }
  55%   { transform: translateY(500px) rotate(-3.5deg); opacity: 0.7; }
  100%  { transform: translateY(2000px) rotate(7deg); opacity: 0; }
}

.end-text {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) perspective(800px) rotateX(-15deg);
  font-size: 4rem;
  font-family: monospace;
  font-weight: 900;
  letter-spacing: 10px;
  text-transform: uppercase;
  opacity: 0;
  animation: fade-in 3s ease-out 2.5s forwards;
  z-index: 100;
}

@keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }

@media (max-width: 600px) {
  .countdown { gap: 20px; }
  .number { font-size: 2.8rem; min-width: 70px; }
  .final-mode #seconds { font-size: 7rem; }
  h1 { font-size: 1.4rem; margin-bottom: 30px; }
}
</style>
</head>
<body>

<h1 id="title">days left</h1>

<div class="countdown" id="countdown">
  <div class="unit" id="day-unit">
    <div class="number" id="days"><span class="current">00</span></div>
    <div class="label">days</div>
  </div>
  <div class="unit" id="hr-unit">
    <div class="number" id="hours"><span class="current">00</span></div>
    <div class="label">hours</div>
  </div>
  <div class="unit" id="min-unit">
    <div class="number" id="minutes"><span class="current">00</span></div>
    <div class="label">minutes</div>
  </div>
  <div class="unit" id="sec-unit">
    <div class="number" id="seconds"><span class="current">00</span></div>
    <div class="label" id="sec-label">seconds</div>
  </div>
</div>

<script>
// ========== ЗВУК ==========
let audioCtx = null;
let tickBuffer = null;
let tickToggle = false;

async function loadTick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (!tickBuffer) {
      const resp = await fetch('tick.wav');
      const arr = await resp.arrayBuffer();
      tickBuffer = await audioCtx.decodeAudioData(arr);
    }
  } catch (e) { console.log(e); }
}

function playTick() {
  if (!audioCtx || !tickBuffer) return;
  const src = audioCtx.createBufferSource();
  src.buffer = tickBuffer;
  src.playbackRate.value = tickToggle ? 0.85 : 1.15;
  tickToggle = !tickToggle;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.7;
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

async function unlockAudio() {
  await loadTick();
  if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
}

document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });
loadTick();

// ========== ТАЙМЕР ==========
const target = new Date(2026, 6, 7, 0, 0, 0).getTime();

const containers = {
  days: document.getElementById('days'),
  hours: document.getElementById('hours'),
  minutes: document.getElementById('minutes'),
  seconds: document.getElementById('seconds')
};

let prev = {};
let finalMode = false;
let ended = false;
let initialized = false;

function pad(n) { return String(n).padStart(2, '0'); }

function setNumberBeat(container, val) {
  const cur = container.querySelector('.current');
  if (cur) {
    cur.textContent = val;
    cur.classList.remove('beat');
    void cur.offsetWidth;
    cur.classList.add('beat');
  }
}

function pulseChange(container, newVal) {
  const cur = container.querySelector('.current');
  if (!cur) return;
  cur.textContent = newVal;
  cur.classList.remove('pulse-tick');
  void cur.offsetWidth;
  cur.classList.add('pulse-tick');
}

function enterFinalMode() {
  if (finalMode) return;
  finalMode = true;
  document.getElementById('title').style.opacity = '0';
  document.getElementById('countdown').classList.add('final-mode');
}

function doEnd() {
  if (ended) return;
  ended = true;
  const secEl = document.getElementById('seconds');
  secEl.innerHTML = '';
  const zero = document.createElement('span');
  zero.className = 'current';
  zero.textContent = '0';
  zero.style.color = '#ff0000';
  zero.style.position = 'relative';
  secEl.appendChild(zero);
  zero.classList.add('glitch-zero');
  setTimeout(() => {
    zero.classList.remove('glitch-zero');
    zero.style.color = '#fff';
    void zero.offsetWidth;
    zero.classList.add('physics-fall');
  }, 700);
  setTimeout(() => {
    document.getElementById('countdown').style.display = 'none';
    const endText = document.createElement('div');
    endText.className = 'end-text';
    endText.textContent = '???';
    document.body.appendChild(endText);
  }, 2500);
}

function update() {
  if (ended) return;
  let diff = target - Date.now();
  if (diff <= 0) { doEnd(); return; }
  const totalSeconds = Math.ceil(diff / 1000);
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if (totalSeconds <= 10) enterFinalMode();
  const now = {
    days: pad(d),
    hours: pad(h),
    minutes: pad(m),
    seconds: finalMode ? String(s) : pad(s)
  };
  let secondsChanged = false;
  for (const key in now) {
    if (now[key] !== prev[key]) {
      if (key === 'seconds' && prev[key] !== undefined) secondsChanged = true;
      if (finalMode && key === 'seconds') {
        setNumberBeat(containers[key], now[key]);
      } else if (prev[key] !== undefined) {
        pulseChange(containers[key], now[key]);
      } else {
        const cur = containers[key].querySelector('.current');
        if (cur) cur.textContent = now[key];
      }
      prev[key] = now[key];
    }
  }
  if (secondsChanged && initialized) playTick();
  if (!initialized) initialized = true;
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
