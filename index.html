<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* --- ТАЙМЕР --- */
.countdown {
  display: flex;
  gap: 20px;
  z-index: 10;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 100px;
}

.number {
  font-size: 3rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.current {
  display: inline-block;
}

/* Анимация пульсации */
.pulse-tick {
  animation: pulse-tick 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
}

@keyframes pulse-tick {
  0%   { transform: scale(1.5); color: #ff0000; }
  100% { transform: scale(1);   color: #ffffff; }
}

.label {
  font-size: 0.5rem;
  margin-top: 15px;
  opacity: 0.5;
}

/* --- КУБИК (МЕДЛЕННЫЙ И РОВНЫЙ) --- */
#cube-container {
  position: fixed;
  bottom: 40px;
  left: -100px; /* Начало за экраном */
  width: 64px;
  height: 64px;
  z-index: 100;
  cursor: pointer;
  /* Медленная прогулка через весь экран */
  animation: walk-smooth 25s linear infinite alternate;
  image-rendering: pixelated;
}

#cube-sprite {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  transition: transform 0.3s; /* Плавный разворот */
}

@keyframes walk-smooth {
  0% { transform: translateX(0vw) scaleX(1); }
  49% { transform: translateX(110vw) scaleX(1); }
  50% { transform: translateX(110vw) scaleX(-1); }
  99% { transform: translateX(0vw) scaleX(-1); }
  100% { transform: translateX(0vw) scaleX(1); }
}

/* --- ДИАЛОГ --- */
#dialogue-box {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 550px;
  max-width: 90%;
  background: #000;
  border: 4px solid #fff;
  display: none;
  padding: 20px;
  z-index: 200;
  flex-direction: row;
  gap: 20px;
}

#dialogue-box.active {
  display: flex;
  animation: open-diag 0.1s steps(2);
}

@keyframes open-diag {
  0% { transform: translateX(-50%) scaleY(0); }
  100% { transform: translateX(-50%) scaleY(1); }
}

.diag-cube-wrap {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  border: 2px solid #333;
}

#diag-cube-img {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

#diag-text {
  font-size: 12px;
  line-height: 1.8;
}

.choices {
  margin-top: 20px;
  display: none;
  gap: 20px;
}

.choice-btn {
  background: none;
  border: none;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  cursor: pointer;
}

.choice-btn:hover { color: #ffff00; }
.choice-btn::before { content: '* '; }

@media (max-width: 600px) {
  .number { font-size: 1.5rem; }
  .unit { min-width: 60px; }
  #dialogue-box { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<div class="countdown" id="countdown">
  <div class="unit"><div class="number" id="days"><span class="current">00</span></div><div class="label">DAYS</div></div>
  <div class="unit"><div class="number" id="hours"><span class="current">00</span></div><div class="label">HOURS</div></div>
  <div class="unit"><div class="number" id="minutes"><span class="current">00</span></div><div class="label">MINS</div></div>
  <div class="unit"><div class="number" id="seconds"><span class="current">00</span></div><div class="label">SECS</div></div>
</div>

<div id="cube-container">
  <img src="idle.png" id="cube-sprite">
</div>

<div id="dialogue-box">
  <div class="diag-cube-wrap"><img src="idle.png" id="diag-cube-img"></div>
  <div class="diag-content">
    <div id="diag-text"></div>
    <div id="choices" class="choices">
      <button class="choice-btn" onclick="handleChoice('yes')">OF COURSE</button>
      <button class="choice-btn" onclick="handleChoice('no')">NO</button>
    </div>
  </div>
</div>

<script>
const targetDate = new Date(2026, 6, 7, 0, 0, 0).getTime();

let audioCtx = null;
let beepBuffer = null;
let tickBuffer = null;

async function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  const loadSound = async (url) => {
    const res = await fetch(url);
    const buf = await res.arrayBuffer();
    return await audioCtx.decodeAudioData(buf);
  };

  try {
    beepBuffer = await loadSound('D.mp3');
    tickBuffer = await loadSound('tick.wav');
  } catch (e) { console.log("Missing sound files"); }
}

function playSound(buffer) {
  if (!audioCtx || !buffer) return;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start();
}

function getOS() {
  const ua = window.navigator.userAgent;
  if (ua.indexOf("Windows") !== -1) return "Windows";
  if (ua.indexOf("Android") !== -1) return "Android";
  if (ua.indexOf("iPhone") !== -1) return "iOS";
  if (ua.indexOf("Mac") !== -1) return "macOS";
  return "System";
}

// --- ТАЙМЕР ---
const containers = {
  days: document.getElementById('days'),
  hours: document.getElementById('hours'),
  minutes: document.getElementById('minutes'),
  seconds: document.getElementById('seconds')
};
let prevValues = {};

function updateTimer() {
  const now = Date.now();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.body.innerHTML = "<h1>ARRIVED</h1>";
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  const currentValues = {
    days: String(d).padStart(2, '0'),
    hours: String(h).padStart(2, '0'),
    minutes: String(m).padStart(2, '0'),
    seconds: String(s).padStart(2, '0')
  };

  for (const key in currentValues) {
    if (currentValues[key] !== prevValues[key]) {
      const el = containers[key].querySelector('.current');
      el.textContent = currentValues[key];
      
      // Анимация рывка
      el.classList.remove('pulse-tick');
      void el.offsetWidth;
      el.classList.add('pulse-tick');
      
      if (key === 'seconds') playSound(tickBuffer);
      prevValues[key] = currentValues[key];
    }
  }
}

// --- ДИАЛОГ ---
const diagBox = document.getElementById('dialogue-box');
const diagText = document.getElementById('diag-text');
const diagImg = document.getElementById('diag-cube-img');
const choicesEl = document.getElementById('choices');

async function startDialogue() {
  if (diagBox.classList.contains('active')) return;
  await initAudio();
  
  diagBox.classList.add('active');
  const os = getOS();
  const daysLeft = Math.floor((targetDate - Date.now()) / 86400000);

  await typeText(`Hello, ${os} user...`);
  await sleep(1000);
  await typeText(`${daysLeft} days left.`);
  await sleep(1000);
  await typeText(`Hope you'll show up in the final seconds, right?`);
  choicesEl.style.display = 'flex';
}

async function typeText(text) {
  diagText.textContent = "";
  choicesEl.style.display = 'none';
  for (let i = 0; i < text.length; i++) {
    diagText.textContent += text[i];
    if (text[i] !== " ") {
      diagImg.src = (i % 2 === 0) ? 'talking0.png' : 'talking1.png';
      playSound(beepBuffer);
    }
    await sleep(60);
  }
  diagImg.src = 'idle.png';
}

function handleChoice(val) {
  if (val === 'yes') typeText("I'll be waiting.");
  else typeText("How disappointing...");
  setTimeout(() => diagBox.classList.remove('active'), 3000);
}

const sleep = m => new Promise(r => setTimeout(r, m));
document.getElementById('cube-container').onclick = startDialogue;

setInterval(updateTimer, 1000);
updateTimer();

// Разблокировка звука
document.addEventListener('click', () => { if(audioCtx) audioCtx.resume(); }, {once: true});
</script>
</body>
</html>
