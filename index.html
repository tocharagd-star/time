<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: #1a1a1a;
  color: #fff;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
}

.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(60,60,70,0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(40,40,50,0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(50,50,60,0.4) 0%, transparent 60%),
    linear-gradient(180deg, #1a1a1f 0%, #2a2a32 50%, #1a1a1f 100%);
  z-index: 0;
}

.lightning-flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  opacity: 0;
  z-index: 2;
  pointer-events: none;
  mix-blend-mode: screen;
}

#storm-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none;
}

h1 {
  font-size: 2rem;
  margin-bottom: 50px;
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  transition: opacity 1s ease;
  position: relative;
  z-index: 10;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.countdown {
  display: flex;
  gap: 50px;
  transition: gap 1s ease;
  position: relative;
  z-index: 10;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: opacity 1s ease, transform 1s ease;
}

.number {
  font-size: 5rem;
  font-weight: 700;
  min-width: 130px;
  text-align: center;
  height: 1.2em;
  line-height: 1.2;
  overflow: hidden;
  position: relative;
  transition: font-size 1s ease;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.number .old,
.number .new {
  display: block;
  position: absolute;
  width: 100%;
  left: 0;
}

.number .current {
  display: block;
  position: relative;
}

.number .old { animation: fall-out 0.4s ease-in forwards; }
.number .new { animation: rise-in 0.4s ease-out forwards; }

@keyframes fall-out {
  0%   { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(100%); opacity: 0; }
}

@keyframes rise-in {
  0%   { transform: translateY(-100%); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.label {
  font-size: 0.8rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 10px;
  opacity: 0.5;
  transition: opacity 1s ease;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

.final-mode .unit:not(#sec-unit) {
  opacity: 0;
  transform: scale(0.5);
  pointer-events: none;
  position: absolute;
}

.final-mode .countdown { gap: 0; }

.final-mode #seconds {
  font-size: 14rem;
  overflow: visible;
}

.final-mode #sec-label { opacity: 0; }

.beat {
  animation: beat 0.8s cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
}

@keyframes beat {
  0%   { transform: scale(1.5); color: #ff0000; }
  100% { transform: scale(1); color: #ffffff; }
}

.glitch-zero {
  position: relative;
  animation: glitch 0.6s steps(4) forwards;
  color: #ff0000 !important;
}

.glitch-zero::before,
.glitch-zero::after {
  content: '0';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.glitch-zero::before {
  color: #ff0000;
  animation: glitch-r 0.6s steps(4) forwards;
  clip-path: inset(0 0 50% 0);
}

.glitch-zero::after {
  color: #0000ff;
  animation: glitch-b 0.6s steps(4) forwards;
  clip-path: inset(50% 0 0 0);
}

@keyframes glitch {
  0%   { transform: translate(4px, -3px); }
  25%  { transform: translate(-5px, 2px); }
  50%  { transform: translate(3px, -1px); }
  75%  { transform: translate(-2px, 4px); }
  100% { transform: translate(0, 0); }
}

@keyframes glitch-r {
  0%   { transform: translate(6px, -4px); }
  100% { transform: translate(0, 0); opacity: 0; }
}

@keyframes glitch-b {
  0%   { transform: translate(-5px, 3px); }
  100% { transform: translate(0, 0); opacity: 0; }
}

.physics-fall {
  animation: physics-fall 3s forwards;
}

@keyframes physics-fall {
  0%    { transform: translateY(0) rotate(0deg); opacity: 1; }
  30%   { transform: translateY(140px) rotate(-2deg); }
  55%   { transform: translateY(500px) rotate(-3.5deg); opacity: 0.7; }
  100%  { transform: translateY(2000px) rotate(7deg); opacity: 0; }
}

.end-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3.5rem;
  font-family: monospace;
  letter-spacing: 10px;
  text-transform: uppercase;
  opacity: 0;
  animation: fade-in 3s ease-out 2.5s forwards;
  z-index: 100;
  text-shadow: 0 0 30px rgba(0,0,0,0.9);
}

@keyframes fade-in {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

@media (max-width: 600px) {
  .countdown { gap: 20px; }
  .number { font-size: 2.5rem; min-width: 65px; }
  .final-mode #seconds { font-size: 7rem; }
  h1 { font-size: 1.2rem; margin-bottom: 30px; }
}
</style>
</head>
<body>

<div class="sky"></div>
<canvas id="storm-canvas"></canvas>
<div class="lightning-flash" id="flash"></div>

<h1 id="title">days left</h1>

<div class="countdown" id="countdown">
  <div class="unit" id="day-unit">
    <div class="number" id="days"><span class="current">00</span></div>
    <div class="label">days</div>
  </div>
  <div class="unit" id="hr-unit">
    <div class="number" id="hours"><span class="current">00</span></div>
    <div class="label">hours</div>
  </div>
  <div class="unit" id="min-unit">
    <div class="number" id="minutes"><span class="current">00</span></div>
    <div class="label">minutes</div>
  </div>
  <div class="unit" id="sec-unit">
    <div class="number" id="seconds"><span class="current">00</span></div>
    <div class="label" id="sec-label">seconds</div>
  </div>
</div>

<script>
// ============ ТАЙМЕР ============
const target = new Date(2026, 6, 7, 0, 0, 0).getTime();

const containers = {
  days: document.getElementById('days'),
  hours: document.getElementById('hours'),
  minutes: document.getElementById('minutes'),
  seconds: document.getElementById('seconds')
};

let prev = {};
let finalMode = false;
let ended = false;

function pad(n) { return String(n).padStart(2, '0'); }

function setNumber(container, val) {
  const cur = container.querySelector('.current');
  if (cur) {
    cur.textContent = val;
    cur.classList.remove('beat');
    void cur.offsetWidth;
    cur.classList.add('beat');
  }
}

function animateChange(container, newVal) {
  const current = container.querySelector('.current');
  if (!current) return;

  const oldSpan = document.createElement('span');
  oldSpan.className = 'old';
  oldSpan.textContent = current.textContent;

  const newSpan = document.createElement('span');
  newSpan.className = 'new';
  newSpan.textContent = newVal;

  container.appendChild(oldSpan);
  container.appendChild(newSpan);
  container.removeChild(current);

  setTimeout(() => {
    if (oldSpan.parentNode) oldSpan.remove();
    newSpan.className = 'current';
    newSpan.style.animation = 'none';
    newSpan.style.transform = 'none';
    newSpan.style.opacity = '1';
    newSpan.style.position = 'relative';
  }, 400);
}

function enterFinalMode() {
  if (finalMode) return;
  finalMode = true;
  document.getElementById('title').style.opacity = '0';
  document.getElementById('countdown').classList.add('final-mode');
}

function doEnd() {
  if (ended) return;
  ended = true;

  const secEl = document.getElementById('seconds');
  secEl.innerHTML = '';

  const zero = document.createElement('span');
  zero.className = 'current';
  zero.textContent = '0';
  zero.style.color = '#ff0000';
  zero.style.position = 'relative';
  secEl.appendChild(zero);

  zero.classList.add('glitch-zero');

  setTimeout(() => {
    zero.classList.remove('glitch-zero');
    zero.style.color = '#fff';
    void zero.offsetWidth;
    zero.classList.add('physics-fall');
  }, 700);

  setTimeout(() => {
    document.getElementById('countdown').style.display = 'none';
    const endText = document.createElement('div');
    endText.className = 'end-text';
    endText.textContent = '???';
    document.body.appendChild(endText);
  }, 2500);
}

function update() {
  if (ended) return;

  let diff = target - Date.now();
  if (diff <= 0) { doEnd(); return; }

  const totalSeconds = Math.ceil(diff / 1000);

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  if (totalSeconds <= 10) enterFinalMode();

  const now = {
    days: pad(d),
    hours: pad(h),
    minutes: pad(m),
    seconds: finalMode ? String(s) : pad(s)
  };

  for (const key in now) {
    if (now[key] !== prev[key]) {
      if (finalMode && key === 'seconds') {
        setNumber(containers[key], now[key]);
      } else if (prev[key] !== undefined) {
        animateChange(containers[key], now[key]);
      } else {
        const cur = containers[key].querySelector('.current');
        if (cur) cur.textContent = now[key];
      }
      prev[key] = now[key];
    }
  }
}

update();
setInterval(update, 1000);

// ============ ГРОЗА ============
const canvas = document.getElementById('storm-canvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// === ДОЖДЬ ===
const raindrops = [];
const RAIN_COUNT = 250;

for (let i = 0; i < RAIN_COUNT; i++) {
  raindrops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    length: 10 + Math.random() * 15,
    speed: 8 + Math.random() * 7,
    opacity: 0.2 + Math.random() * 0.4
  });
}

// === МОЛНИИ ===
function makeLightning() {
  const startX = Math.random() * canvas.width;
  const segments = [{x: startX, y: 0}];
  const branches = [];
  let x = startX;
  let y = 0;
  const endY = canvas.height * (0.6 + Math.random() * 0.3);

  while (y < endY) {
    y += 15 + Math.random() * 25;
    x += (Math.random() - 0.5) * 60;
    segments.push({x, y});

    // ответвление
    if (Math.random() < 0.35 && segments.length > 2) {
      const branch = [{x, y}];
      let bx = x, by = y;
      const blen = 4 + Math.floor(Math.random() * 5);
      const bdir = (Math.random() - 0.5) * 2;
      for (let i = 0; i < blen; i++) {
        by += 8 + Math.random() * 18;
        bx += bdir * (5 + Math.random() * 15) + (Math.random() - 0.5) * 20;
        branch.push({x: bx, y: by});
      }
      branches.push(branch);
    }
  }

  return {segments, life: 1, branches, frame: 0};
}

let activeLightning = null;
let lightningTimer = 0;
let nextLightning = 60; // первая молния через 1 секунду

function triggerLightning() {
  activeLightning = makeLightning();

  // основная вспышка
  flash.style.transition = 'none';
  flash.style.opacity = '0.85';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.2s ease-out';
    flash.style.opacity = '0';
  }, 60);

  // вторая вспышка
  setTimeout(() => {
    flash.style.transition = 'none';
    flash.style.opacity = '0.5';
    setTimeout(() => {
      flash.style.transition = 'opacity 0.35s ease-out';
      flash.style.opacity = '0';
    }, 50);
  }, 220);
}

function drawLightning(l) {
  // ШИРОКОЕ СВЕЧЕНИЕ (внешний glow)
  ctx.save();
  ctx.strokeStyle = `rgba(150, 180, 255, ${l.life * 0.4})`;
  ctx.lineWidth = 18;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(l.segments[0].x, l.segments[0].y);
  for (let i = 1; i < l.segments.length; i++) {
    ctx.lineTo(l.segments[i].x, l.segments[i].y);
  }
  ctx.stroke();
  ctx.restore();

  // СРЕДНЕЕ СВЕЧЕНИЕ
  ctx.save();
  ctx.strokeStyle = `rgba(200, 220, 255, ${l.life * 0.7})`;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(l.segments[0].x, l.segments[0].y);
  for (let i = 1; i < l.segments.length; i++) {
    ctx.lineTo(l.segments[i].x, l.segments[i].y);
  }
  ctx.stroke();
  ctx.restore();

  // ЯДРО (яркое белое)
  ctx.save();
  ctx.strokeStyle = `rgba(255, 255, 255, ${l.life})`;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(l.segments[0].x, l.segments[0].y);
  for (let i = 1; i < l.segments.length; i++) {
    ctx.lineTo(l.segments[i].x, l.segments[i].y);
  }
  ctx.stroke();
  ctx.restore();

  // ОТВЕТВЛЕНИЯ — свечение
  ctx.save();
  ctx.strokeStyle = `rgba(180, 200, 255, ${l.life * 0.5})`;
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  l.branches.forEach(br => {
    ctx.beginPath();
    ctx.moveTo(br[0].x, br[0].y);
    for (let i = 1; i < br.length; i++) {
      ctx.lineTo(br[i].x, br[i].y);
    }
    ctx.stroke();
  });
  ctx.restore();

  // ОТВЕТВЛЕНИЯ — ядро
  ctx.save();
  ctx.strokeStyle = `rgba(255, 255, 255, ${l.life * 0.9})`;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  l.branches.forEach(br => {
    ctx.beginPath();
    ctx.moveTo(br[0].x, br[0].y);
    for (let i = 1; i < br.length; i++) {
      ctx.lineTo(br[i].x, br[i].y);
    }
    ctx.stroke();
  });
  ctx.restore();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // дождь
  ctx.strokeStyle = 'rgba(180, 200, 220, 0.4)';
  ctx.lineWidth = 1;
  for (const drop of raindrops) {
    ctx.globalAlpha = drop.opacity;
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x - 2, drop.y + drop.length);
    ctx.stroke();

    drop.y += drop.speed;
    drop.x -= 2;

    if (drop.y > canvas.height) {
      drop.y = -20;
      drop.x = Math.random() * canvas.width + 100;
    }
    if (drop.x < 0) drop.x = canvas.width;
  }
  ctx.globalAlpha = 1;

  // молния — держится дольше
  if (activeLightning) {
    activeLightning.frame++;
    // первые 8 кадров — яркая, потом плавно гаснет
    if (activeLightning.frame < 8) {
      activeLightning.life = 1;
    } else {
      activeLightning.life -= 0.04;
    }
    drawLightning(activeLightning);
    if (activeLightning.life <= 0) activeLightning = null;
  }

  // таймер молний
  lightningTimer++;
  if (lightningTimer >= nextLightning) {
    triggerLightning();
    lightningTimer = 0;
    nextLightning = 100 + Math.random() * 250;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
