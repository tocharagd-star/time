<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  color: #fff;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  background: #1a0f1a;
}

/* небо заката — плавный градиент без полос */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    180deg,
    #0a0820 0%,
    #1a1040 12%,
    #3d1d5e 28%,
    #6b2858 42%,
    #a83a52 55%,
    #d85a3e 67%,
    #e8843e 76%,
    #f0a548 83%,
    #c66838 90%,
    #4a2030 96%,
    #15080f 100%
  );
  z-index: 0;
}

/* шум против бандинга */
.sky::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.015) 1px, transparent 0);
  background-size: 3px 3px;
  pointer-events: none;
  mix-blend-mode: overlay;
}

/* атмосферная дымка для плавности */
.atmosphere {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255, 140, 70, 0.35) 0%, transparent 60%),
    radial-gradient(ellipse 120% 40% at 50% 90%, rgba(255, 100, 60, 0.2) 0%, transparent 70%);
  z-index: 1;
  pointer-events: none;
}

/* солнце */
.sun-wrap {
  position: fixed;
  left: 50%;
  bottom: 5%;
  transform: translateX(-50%);
  z-index: 2;
  pointer-events: none;
}

.sun {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 45%,
    #fffaea 0%,
    #ffeeb0 20%,
    #ffc870 45%,
    #ff924a 70%,
    #ff6030 90%,
    rgba(255, 70, 30, 0) 100%);
  position: relative;
  animation: sun-pulse 5s ease-in-out infinite;
}

/* большое ореол свечение через radial */
.sun-glow {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 1200px;
  height: 1200px;
  background: radial-gradient(circle at center,
    rgba(255, 180, 90, 0.55) 0%,
    rgba(255, 140, 70, 0.3) 18%,
    rgba(255, 100, 60, 0.18) 32%,
    rgba(255, 80, 50, 0.08) 50%,
    transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  animation: glow-pulse 5s ease-in-out infinite;
}

@keyframes sun-pulse {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50%      { transform: scale(1.03); filter: brightness(1.1); }
}

@keyframes glow-pulse {
  0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
  50%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.08); }
}

/* дальние горы силуэт */
.mountains {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 18%;
  background: linear-gradient(180deg, transparent 0%, rgba(20, 8, 15, 0.6) 60%, rgba(15, 5, 12, 0.95) 100%);
  z-index: 3;
  pointer-events: none;
}

.mountains svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* облака — мягкие радиальные градиенты, не полосы */
.cloud {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 4;
  filter: blur(12px);
  opacity: 0.85;
}

.cloud-1 {
  width: 500px;
  height: 80px;
  top: 28%;
  left: -200px;
  background: radial-gradient(ellipse at center,
    rgba(80, 30, 40, 0.7) 0%,
    rgba(60, 20, 35, 0.5) 40%,
    transparent 75%);
  animation: drift1 90s linear infinite;
}

.cloud-2 {
  width: 700px;
  height: 100px;
  top: 42%;
  left: -300px;
  background: radial-gradient(ellipse at center,
    rgba(140, 60, 50, 0.55) 0%,
    rgba(90, 40, 45, 0.35) 45%,
    transparent 75%);
  animation: drift2 130s linear infinite;
}

.cloud-3 {
  width: 400px;
  height: 60px;
  top: 18%;
  left: -150px;
  background: radial-gradient(ellipse at center,
    rgba(50, 25, 50, 0.6) 0%,
    rgba(40, 20, 40, 0.4) 45%,
    transparent 75%);
  animation: drift3 110s linear infinite;
}

.cloud-4 {
  width: 600px;
  height: 90px;
  top: 52%;
  left: -250px;
  background: radial-gradient(ellipse at center,
    rgba(30, 15, 25, 0.7) 0%,
    rgba(50, 25, 35, 0.45) 45%,
    transparent 75%);
  animation: drift1 160s linear infinite;
}

.cloud-5 {
  width: 350px;
  height: 50px;
  top: 10%;
  left: -100px;
  background: radial-gradient(ellipse at center,
    rgba(40, 20, 50, 0.55) 0%,
    transparent 70%);
  animation: drift2 200s linear infinite;
}

@keyframes drift1 {
  0%   { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 400px)); }
}

@keyframes drift2 {
  0%   { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 500px)); }
}

@keyframes drift3 {
  0%   { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 300px)); }
}

/* звёзды наверху */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40%;
  z-index: 1;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50%      { opacity: 0.8; }
}

/* птицы */
.birds {
  position: fixed;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

.bird {
  position: absolute;
  width: 16px;
  height: 8px;
  animation: bird-fly 40s linear infinite;
}

.bird::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 25% 50%, rgba(15,5,15,0.85) 0%, transparent 40%),
    radial-gradient(circle at 75% 50%, rgba(15,5,15,0.85) 0%, transparent 40%);
  animation: wing-flap 0.6s ease-in-out infinite;
}

.bird-1 { top: 25%; animation-delay: 0s; }
.bird-2 { top: 28%; left: -50px; animation-delay: -10s; animation-duration: 50s; }
.bird-3 { top: 22%; left: -50px; animation-delay: -25s; animation-duration: 60s; }

@keyframes bird-fly {
  0%   { left: -30px; transform: translateY(0); }
  25%  { transform: translateY(-15px); }
  50%  { transform: translateY(5px); }
  75%  { transform: translateY(-10px); }
  100% { left: calc(100% + 30px); transform: translateY(0); }
}

@keyframes wing-flap {
  0%, 100% { transform: scaleY(1); }
  50%      { transform: scaleY(0.5); }
}

/* контент */
h1 {
  font-size: 2rem;
  margin-bottom: 50px;
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  transition: opacity 1s ease;
  position: relative;
  z-index: 10;
  text-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.5);
}

.countdown {
  display: flex;
  gap: 50px;
  transition: gap 1s ease;
  position: relative;
  z-index: 10;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: opacity 1s ease, transform 1s ease;
}

.number {
  font-size: 5rem;
  font-weight: 700;
  min-width: 130px;
  text-align: center;
  height: 1.2em;
  line-height: 1.2;
  overflow: hidden;
  position: relative;
  transition: font-size 1s ease;
  text-shadow: 0 2px 20px rgba(0,0,0,0.95), 0 0 40px rgba(0,0,0,0.6);
}

.number .old,
.number .new {
  display: block;
  position: absolute;
  width: 100%;
  left: 0;
}

.number .current { display: block; position: relative; }

.number .old { animation: fall-out 0.4s ease-in forwards; }
.number .new { animation: rise-in 0.4s ease-out forwards; }

@keyframes fall-out {
  0%   { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(100%); opacity: 0; }
}

@keyframes rise-in {
  0%   { transform: translateY(-100%); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.label {
  font-size: 0.8rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 10px;
  opacity: 0.75;
  transition: opacity 1s ease;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

.final-mode .unit:not(#sec-unit) {
  opacity: 0;
  transform: scale(0.5);
  pointer-events: none;
  position: absolute;
}

.final-mode .countdown { gap: 0; }

.final-mode #seconds {
  font-size: 14rem;
  overflow: visible;
}

.final-mode #sec-label { opacity: 0; }

.beat {
  animation: beat 0.8s cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
}

@keyframes beat {
  0%   { transform: scale(1.5); color: #ff0000; }
  100% { transform: scale(1); color: #ffffff; }
}

.glitch-zero {
  position: relative;
  animation: glitch 0.6s steps(4) forwards;
  color: #ff0000 !important;
}

.glitch-zero::before,
.glitch-zero::after {
  content: '0';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.glitch-zero::before {
  color: #ff0000;
  animation: glitch-r 0.6s steps(4) forwards;
  clip-path: inset(0 0 50% 0);
}

.glitch-zero::after {
  color: #0000ff;
  animation: glitch-b 0.6s steps(4) forwards;
  clip-path: inset(50% 0 0 0);
}

@keyframes glitch {
  0%   { transform: translate(4px, -3px); }
  25%  { transform: translate(-5px, 2px); }
  50%  { transform: translate(3px, -1px); }
  75%  { transform: translate(-2px, 4px); }
  100% { transform: translate(0, 0); }
}

@keyframes glitch-r {
  0%   { transform: translate(6px, -4px); }
  100% { transform: translate(0, 0); opacity: 0; }
}

@keyframes glitch-b {
  0%   { transform: translate(-5px, 3px); }
  100% { transform: translate(0, 0); opacity: 0; }
}

.physics-fall { animation: physics-fall 3s forwards; }

@keyframes physics-fall {
  0%    { transform: translateY(0) rotate(0deg); opacity: 1; }
  30%   { transform: translateY(140px) rotate(-2deg); }
  55%   { transform: translateY(500px) rotate(-3.5deg); opacity: 0.7; }
  100%  { transform: translateY(2000px) rotate(7deg); opacity: 0; }
}

.end-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3.5rem;
  font-family: monospace;
  letter-spacing: 10px;
  text-transform: uppercase;
  opacity: 0;
  animation: fade-in 3s ease-out 2.5s forwards;
  z-index: 100;
  text-shadow: 0 0 30px rgba(0,0,0,0.9);
}

@keyframes fade-in {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

@media (max-width: 600px) {
  .countdown { gap: 20px; }
  .number { font-size: 2.5rem; min-width: 65px; }
  .final-mode #seconds { font-size: 7rem; }
  h1 { font-size: 1.2rem; margin-bottom: 30px; }
  .sun { width: 180px; height: 180px; }
  .sun-glow { width: 800px; height: 800px; }
}
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="atmosphere"></div>

<div class="sun-wrap">
  <div class="sun-glow"></div>
  <div class="sun"></div>
</div>

<div class="cloud cloud-5"></div>
<div class="cloud cloud-3"></div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-4"></div>

<div class="mountains">
  <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
    <path d="M0,200 L0,140 L80,100 L160,130 L240,80 L340,110 L420,70 L520,120 L620,90 L720,130 L820,100 L920,140 L1020,110 L1120,150 L1200,120 L1200,200 Z" fill="#0a0508" opacity="0.95"/>
    <path d="M0,200 L0,170 L100,150 L200,165 L320,140 L430,160 L540,135 L650,165 L760,145 L880,170 L1000,150 L1100,175 L1200,155 L1200,200 Z" fill="#1a0a15" opacity="0.9"/>
  </svg>
</div>

<div class="birds">
  <div class="bird bird-1"></div>
  <div class="bird bird-2"></div>
  <div class="bird bird-3"></div>
</div>

<h1 id="title">days left</h1>

<div class="countdown" id="countdown">
  <div class="unit" id="day-unit">
    <div class="number" id="days"><span class="current">00</span></div>
    <div class="label">days</div>
  </div>
  <div class="unit" id="hr-unit">
    <div class="number" id="hours"><span class="current">00</span></div>
    <div class="label">hours</div>
  </div>
  <div class="unit" id="min-unit">
    <div class="number" id="minutes"><span class="current">00</span></div>
    <div class="label">minutes</div>
  </div>
  <div class="unit" id="sec-unit">
    <div class="number" id="seconds"><span class="current">00</span></div>
    <div class="label" id="sec-label">seconds</div>
  </div>
</div>

<script>
// генерация звёзд
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = (Math.random() * 4) + 's';
  s.style.animationDuration = (3 + Math.random() * 3) + 's';
  s.style.width = s.style.height = (1 + Math.random() * 1.5) + 'px';
  starsContainer.appendChild(s);
}

// ============ ТАЙМЕР ============
const target = new Date(2026, 6, 7, 0, 0, 0).getTime();

const containers = {
  days: document.getElementById('days'),
  hours: document.getElementById('hours'),
  minutes: document.getElementById('minutes'),
  seconds: document.getElementById('seconds')
};

let prev = {};
let finalMode = false;
let ended = false;

function pad(n) { return String(n).padStart(2, '0'); }

function setNumber(container, val) {
  const cur = container.querySelector('.current');
  if (cur) {
    cur.textContent = val;
    cur.classList.remove('beat');
    void cur.offsetWidth;
    cur.classList.add('beat');
  }
}

function animateChange(container, newVal) {
  const current = container.querySelector('.current');
  if (!current) return;

  const oldSpan = document.createElement('span');
  oldSpan.className = 'old';
  oldSpan.textContent = current.textContent;

  const newSpan = document.createElement('span');
  newSpan.className = 'new';
  newSpan.textContent = newVal;

  container.appendChild(oldSpan);
  container.appendChild(newSpan);
  container.removeChild(current);

  setTimeout(() => {
    if (oldSpan.parentNode) oldSpan.remove();
    newSpan.className = 'current';
    newSpan.style.animation = 'none';
    newSpan.style.transform = 'none';
    newSpan.style.opacity = '1';
    newSpan.style.position = 'relative';
  }, 400);
}

function enterFinalMode() {
  if (finalMode) return;
  finalMode = true;
  document.getElementById('title').style.opacity = '0';
  document.getElementById('countdown').classList.add('final-mode');
}

function doEnd() {
  if (ended) return;
  ended = true;

  const secEl = document.getElementById('seconds');
  secEl.innerHTML = '';

  const zero = document.createElement('span');
  zero.className = 'current';
  zero.textContent = '0';
  zero.style.color = '#ff0000';
  zero.style.position = 'relative';
  secEl.appendChild(zero);

  zero.classList.add('glitch-zero');

  setTimeout(() => {
    zero.classList.remove('glitch-zero');
    zero.style.color = '#fff';
    void zero.offsetWidth;
    zero.classList.add('physics-fall');
  }, 700);

  setTimeout(() => {
    document.getElementById('countdown').style.display = 'none';
    const endText = document.createElement('div');
    endText.className = 'end-text';
    endText.textContent = '???';
    document.body.appendChild(endText);
  }, 2500);
}

function update() {
  if (ended) return;

  let diff = target - Date.now();
  if (diff <= 0) { doEnd(); return; }

  const totalSeconds = Math.ceil(diff / 1000);

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  if (totalSeconds <= 10) enterFinalMode();

  const now = {
    days: pad(d),
    hours: pad(h),
    minutes: pad(m),
    seconds: finalMode ? String(s) : pad(s)
  };

  for (const key in now) {
    if (now[key] !== prev[key]) {
      if (finalMode && key === 'seconds') {
        setNumber(containers[key], now[key]);
      } else if (prev[key] !== undefined) {
        animateChange(containers[key], now[key]);
      } else {
        const cur = containers[key].querySelector('.current');
        if (cur) cur.textContent = now[key];
      }
      prev[key] = now[key];
    }
  }
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
